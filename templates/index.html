<!DOCTYPE html>
<html>
<head>
    <title>Iris Flower Prediction</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background:#f4f4f4;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0px 0px 15px rgba(0,0,0,0.2);
            width:400px;
            text-align:center;
        }

        h1{
            color:#333;
        }

        input{
            width:90%;
            padding:10px;
            margin:8px;
            border:1px solid #ccc;
            border-radius:5px;
        }

        button{
            background:#28a745;
            color:white;
            border:none;
            padding:12px 20px;
            border-radius:5px;
            cursor:pointer;
            width:95%;
            font-size:16px;
        }

        button:hover{
            background:#218838;
        }

        h2{
            color:blue;
            margin-top:20px;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>Iris Flower Prediction</h1>

    <form action="/predict" method="post">

        <input type="number" step="any" name="sepal_length"
               placeholder="Sepal Length" required>

        <input type="number" step="any" name="sepal_width"
               placeholder="Sepal Width" required>

        <input type="number" step="any" name="petal_length"
               placeholder="Petal Length" required>

        <input type="number" step="any" name="petal_width"
               placeholder="Petal Width" required>

        <button type="submit">Predict</button>

    </form>

    <h2>{{ prediction_text }}</h2>

</div>

</body>
</html>
